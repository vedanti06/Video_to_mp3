apiVersion: apps/v1
kind: Deployment
metadata: 
  name: convertor
  labels:
    app: convertor
spec:
  replicas: 4
  selector:
    matchLabels:
      app: convertor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 8
  template:
    metadata:
      labels:
        app: convertor
    spec:
      containers:
        - name: convertor
          image: vd0610/convertor:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_DEFAULT_PASS
          envFrom:
            - configMapRef:
                name: convertor-configmap
            - secretRef:
                name: convertor-secret