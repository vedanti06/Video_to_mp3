# Jenkins UI: http://localhost:9090  (9090 avoids clash with gateway port-forward)
# Start: docker compose -f jenkins/docker-compose.yml up -d
# Password: docker exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    user: root
    ports:
      - "9090:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ${USERPROFILE}/.kube:/root/.kube:ro

volumes:
  jenkins_home:
